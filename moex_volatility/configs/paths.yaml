# Paths Configuration
# ===================

# Input data
data:
  # Main dataset from moex_discovery
  dataset_final: "../moex_discovery/data/dataset_final"

  # Subdirectories
  stocks_rv: "../moex_discovery/data/dataset_final/01_stocks/rv_daily.parquet"
  stocks_candles: "../moex_discovery/data/dataset_final/01_stocks/candles_10m"

  external_rv: "../moex_discovery/data/dataset_final/02_external/rv_moex.parquet"
