# Model Configurations
# ====================

# Forecast horizons
horizons:
  - 1   # 1-day ahead
  - 5   # 1-week ahead (5 trading days)
  - 22  # 1-month ahead (22 trading days)

# ============================================
# HAR-RV-J Model
# ============================================
har:
  name: "HAR-RV-J"
  enabled: true

  # Grid search parameters
  grid_search:
    lags:
      - [1, 5, 22]           # Standard HAR
      - [1, 5, 10, 22]       # Extended
      - [1, 2, 5, 10, 22]    # Full
    include_jump: [true, false]
    include_rsv: [true, false]
    use_log: [true, false]
    estimator: ["ols", "wls", "robust"]

  # Best defaults
  defaults:
    lags: [1, 5, 22]
    include_jump: true
    include_rsv: false
    use_log: true
    estimator: "ols"
    add_constant: true
    robust_cov: true

# ============================================
# GARCH-GJR Model
# ============================================
garch:
  name: "GARCH-GJR"
  enabled: true

  # Grid search parameters
  grid_search:
    p: [1, 2]
    q: [1, 2]
    o: [0, 1]  # Asymmetric term
    dist: ["normal", "t", "skewt", "ged"]
    mean: ["Constant", "AR", "Zero"]
    vol: ["GARCH", "EGARCH", "GJR-GARCH"]

  # Best defaults
  defaults:
    p: 1
    q: 1
    o: 1
    dist: "t"
    mean: "Zero"
    vol: "GARCH"
    rescale: true

# ============================================
# LightGBM Model
# ============================================
lightgbm:
  name: "LightGBM"
  enabled: true

  # Optuna search space
  search_space:
    n_estimators: [100, 2000]
    max_depth: [-1, 15]
    learning_rate: [0.005, 0.2]
    num_leaves: [7, 127]
    min_child_samples: [5, 100]
    subsample: [0.6, 1.0]
    colsample_bytree: [0.6, 1.0]
    reg_alpha: [1e-8, 10.0]
    reg_lambda: [1e-8, 10.0]

  # Best defaults
  defaults:
    n_estimators: 1000
    max_depth: -1
    learning_rate: 0.05
    num_leaves: 31
    min_child_samples: 20
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 0.1
    early_stopping_rounds: 50
    verbose: -1

  # GPU settings (uncomment to enable)
  # gpu:
  #   device: "gpu"
  #   gpu_platform_id: 0
  #   gpu_device_id: 0

# ============================================
# XGBoost Model
# ============================================
xgboost:
  name: "XGBoost"
  enabled: true

  # Optuna search space
  search_space:
    n_estimators: [100, 2000]
    max_depth: [3, 10]
    learning_rate: [0.005, 0.2]
    min_child_weight: [1, 10]
    subsample: [0.6, 1.0]
    colsample_bytree: [0.6, 1.0]
    reg_alpha: [1e-8, 10.0]
    reg_lambda: [1e-8, 10.0]

  # Best defaults
  defaults:
    n_estimators: 1000
    max_depth: 6
    learning_rate: 0.05
    min_child_weight: 1
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0
    early_stopping_rounds: 50
    verbosity: 0

  # GPU settings (uncomment to enable)
  # gpu:
  #   tree_method: "gpu_hist"
  #   gpu_id: 0

# ============================================
# GRU Model
# ============================================
gru:
  name: "GRU"
  enabled: true

  # Optuna search space
  search_space:
    hidden_size: [16, 32, 64, 128, 256]
    num_layers: [1, 3]
    dropout: [0.0, 0.5]
    sequence_length: [5, 10, 22, 44, 66]
    learning_rate: [0.0001, 0.01]
    batch_size: [16, 32, 64, 128]
    bidirectional: [true, false]

  # Best defaults
  defaults:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
    sequence_length: 22
    batch_size: 32
    learning_rate: 0.001
    epochs: 100
    patience: 10
    bidirectional: false

# ============================================
# LSTM Model
# ============================================
lstm:
  name: "LSTM"
  enabled: true

  # Optuna search space
  search_space:
    hidden_size: [16, 32, 64, 128, 256]
    num_layers: [1, 3]
    dropout: [0.0, 0.5]
    sequence_length: [5, 10, 22, 44, 66]
    learning_rate: [0.0001, 0.01]
    batch_size: [16, 32, 64, 128]
    bidirectional: [true, false]
    use_attention: [true, false]

  # Best defaults
  defaults:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
    sequence_length: 22
    batch_size: 32
    learning_rate: 0.001
    epochs: 100
    patience: 10
    bidirectional: false
    use_attention: false

# ============================================
# Hybrid Model (HAR + LightGBM)
# ============================================
hybrid:
  name: "HAR+LGBM"
  enabled: true

  # HAR component
  har_config:
    lags: [1, 5, 22]
    include_jump: true
    use_log: true

  # LightGBM component (for residuals)
  lgbm_config:
    n_estimators: 500
    max_depth: 5
    learning_rate: 0.05
    num_leaves: 15

  # Combination method
  combination: "additive"  # 'additive' or 'weighted'

# ============================================
# Training Settings
# ============================================
training:
  seed: 42
  n_trials: 100           # Optuna trials
  early_stopping: 50
  cross_validation: false  # Use time-based split instead

# ============================================
# Evaluation Metrics
# ============================================
evaluation:
  primary_metric: "qlike"
  metrics:
    - qlike
    - mse
    - rmse
    - mae
    - r2
    - correlation
